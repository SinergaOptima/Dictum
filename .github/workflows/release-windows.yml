name: Windows Release

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "stable publishes as normal release; canary publishes as prerelease"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - canary
      publish_as_latest:
        description: "mark release as latest (stable only)"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 90
    concurrency:
      group: release-windows-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dictum-ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install UI dependencies
        working-directory: dictum-ui
        run: npm ci

      - name: Build Tauri NSIS bundle
        working-directory: dictum-app
        run: cargo tauri build --bundles nsis

      - name: Locate build artifacts
        id: artifacts
        shell: pwsh
        run: |
          $exe = Resolve-Path "target/release/dictum.exe"
          $installer = Get-ChildItem "target/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer not found."
          }
          "exe_path=$($exe.Path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $channel = "stable"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.release_channel }}" -eq "canary") {
            $channel = "canary"
          }
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$([bool]($channel -eq 'canary'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sign binaries (required)
        id: sign_step
        timeout-minutes: 20
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          WINDOWS_CERT_EXPECTED_SUBJECT: ${{ secrets.WINDOWS_CERT_EXPECTED_SUBJECT }}
        run: |
          $ErrorActionPreference = "Stop"

          function Invoke-SignToolWithTimeout {
            param(
              [string]$SignToolPath,
              [string[]]$Arguments,
              [int]$TimeoutSeconds
            )
            $process = Start-Process -FilePath $SignToolPath -ArgumentList $Arguments -PassThru -NoNewWindow
            if (-not $process.WaitForExit($TimeoutSeconds * 1000)) {
              try { $process.Kill($true) } catch {}
              throw "signtool timed out after ${TimeoutSeconds}s."
            }
            if ($process.ExitCode -ne 0) {
              throw "signtool failed with exit code $($process.ExitCode)."
            }
          }

          function Sign-FileWithRetries {
            param(
              [string]$SignToolPath,
              [string]$CertPath,
              [string]$Password,
              [string]$FilePath
            )
            $timestampServers = @(
              "http://timestamp.digicert.com",
              "http://timestamp.sectigo.com",
              "http://rfc3161timestamp.globalsign.com/advanced"
            )
            $attempt = 0
            $lastError = $null
            foreach ($tsa in $timestampServers) {
              $attempt += 1
              try {
                Write-Host "Signing $FilePath (attempt $attempt via $tsa)"
                Invoke-SignToolWithTimeout -SignToolPath $SignToolPath -TimeoutSeconds 180 -Arguments @(
                  "sign",
                  "/debug",
                  "/fd", "SHA256",
                  "/f", $CertPath,
                  "/p", $Password,
                  "/tr", $tsa,
                  "/td", "SHA256",
                  $FilePath
                )
                return
              } catch {
                $lastError = $_
                Write-Warning "Signing attempt $attempt failed for $FilePath: $($_.Exception.Message)"
              }
            }
            throw "Failed to sign $FilePath after $attempt attempts. Last error: $($lastError.Exception.Message)"
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)) {
            throw "Signing secrets are required. Set WINDOWS_CERT_BASE64 and WINDOWS_CERT_PASSWORD."
          }
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe not found on runner."
          }
          "signtool_path=$($signtool.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Sign-FileWithRetries -SignToolPath $signtool.FullName -CertPath $certPath -Password $env:WINDOWS_CERT_PASSWORD -FilePath "${{ steps.artifacts.outputs.exe_path }}"
          Sign-FileWithRetries -SignToolPath $signtool.FullName -CertPath $certPath -Password $env:WINDOWS_CERT_PASSWORD -FilePath "${{ steps.artifacts.outputs.installer_path }}"
          $flags = [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::DefaultKeySet
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($certPath, $env:WINDOWS_CERT_PASSWORD, $flags)
          $subject = $cert.Subject
          $pubCertPath = Join-Path $env:RUNNER_TEMP "codesign.cer"
          [IO.File]::WriteAllBytes($pubCertPath, $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
          Import-Certificate -FilePath $pubCertPath -CertStoreLocation Cert:\CurrentUser\TrustedPublisher | Out-Null
          Import-Certificate -FilePath $pubCertPath -CertStoreLocation Cert:\CurrentUser\Root | Out-Null
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_EXPECTED_SUBJECT) -and $subject -notmatch [regex]::Escape($env:WINDOWS_CERT_EXPECTED_SUBJECT)) {
            throw "Signing certificate subject '$subject' does not include expected '$($env:WINDOWS_CERT_EXPECTED_SUBJECT)'."
          }
          "signed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify Authenticode signatures (informational)
        continue-on-error: true
        timeout-minutes: 5
        shell: pwsh
        env:
          WINDOWS_CERT_EXPECTED_SUBJECT: ${{ secrets.WINDOWS_CERT_EXPECTED_SUBJECT }}
        run: |
          $ErrorActionPreference = "Stop"
          $signtool = "${{ steps.sign_step.outputs.signtool_path }}"
          if ([string]::IsNullOrWhiteSpace($signtool) -or -not (Test-Path $signtool)) {
            throw "signtool path missing from signing step output."
          }
          $files = @(
            "${{ steps.artifacts.outputs.exe_path }}",
            "${{ steps.artifacts.outputs.installer_path }}"
          )
          foreach ($file in $files) {
            & $signtool verify /pa /v $file
            if ($LASTEXITCODE -ne 0) {
              throw "signtool verification failed for $file"
            }
            $sig = Get-AuthenticodeSignature $file
            if (-not $sig.SignerCertificate) {
              throw "Authenticode signature missing signer certificate for $file (status=$($sig.Status))"
            }
            $subject = $sig.SignerCertificate.Subject
            if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_EXPECTED_SUBJECT) -and $subject -notmatch [regex]::Escape($env:WINDOWS_CERT_EXPECTED_SUBJECT)) {
              throw "Signer subject '$subject' does not include expected '$($env:WINDOWS_CERT_EXPECTED_SUBJECT)' for $file."
            }
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $exeHash = (Get-FileHash "${{ steps.artifacts.outputs.exe_path }}" -Algorithm SHA256).Hash
          $installerHash = (Get-FileHash "${{ steps.artifacts.outputs.installer_path }}" -Algorithm SHA256).Hash
          @(
            "dictum.exe  $exeHash"
            "$(Split-Path -Leaf '${{ steps.artifacts.outputs.installer_path }}')  $installerHash"
          ) | Out-File -FilePath "target/release/SHA256SUMS.txt" -Encoding ascii

      - name: Verify checksum file format
        shell: pwsh
        run: |
          $lines = Get-Content "target/release/SHA256SUMS.txt"
          if ($lines.Count -lt 2) { throw "SHA256SUMS.txt is missing required entries" }
          foreach ($line in $lines) {
            if ($line -notmatch "^[^ ]+\s+[A-Fa-f0-9]{64}$") {
              throw "Malformed checksum line: $line"
            }
          }

      - name: Write release manifest
        shell: pwsh
        run: |
          $manifest = @{
            tag = "${{ github.ref_name }}"
            commit = "${{ github.sha }}"
            channel = "${{ steps.release_meta.outputs.channel }}"
            signed = "${{ steps.sign_step.outputs.signed }}"
            generated_at_utc = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json
          $manifest | Out-File -FilePath "target/release/RELEASE_MANIFEST.json" -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dictum-windows-release
          path: |
            ${{ steps.artifacts.outputs.exe_path }}
            ${{ steps.artifacts.outputs.installer_path }}
            target/release/SHA256SUMS.txt
            target/release/RELEASE_MANIFEST.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_as_latest == false && 'false' || 'true' }}
          files: |
            ${{ steps.artifacts.outputs.exe_path }}
            ${{ steps.artifacts.outputs.installer_path }}
            target/release/SHA256SUMS.txt
            target/release/RELEASE_MANIFEST.json
